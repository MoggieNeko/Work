<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG Video Finder V5A</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <div>
        <h1>IG Video Finder V5A</h1>
        <p>Chrome Extension 負責 Instagram 搜尋與收集，網站負責分析、排序、匯出。</p>
      </div>
      <div class="hero-actions">
        <a class="btn secondary" href="https://www.instagram.com/" target="_blank" rel="noreferrer">開 Instagram</a>
      </div>
    </header>

    <section class="panel">
      <h2>使用方法</h2>
      <ol>
        <li>先在 Chrome 安裝 extension 並登入 Instagram。</li>
        <li>用 extension 搜尋並收集結果。</li>
        <li>把 extension 匯出的 JSON 貼到下面，或直接上傳 JSON。</li>
        <li>在網站做語言、產品、背景色篩選，再匯出結果。</li>
      </ol>
    </section>

    <section class="panel grid-two">
      <div>
        <h2>1. 匯入資料</h2>
        <label class="label">貼上 Extension JSON</label>
        <textarea id="jsonInput" rows="14" placeholder='把 extension 複製出來的 JSON 貼到這裡'></textarea>
        <div class="row">
          <label class="btn secondary upload-btn">
            上傳 JSON
            <input id="fileInput" type="file" accept="application/json,.json" hidden />
          </label>
          <button id="loadSampleBtn" class="btn secondary">載入示範資料</button>
        </div>
      </div>

      <div>
        <h2>2. 分析條件</h2>
        <label class="label">語言</label>
        <select id="languageFilter">
          <option value="all">全部</option>
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="unknown">未知</option>
        </select>

        <label class="label">產品關鍵字（逗號分隔）</label>
        <input id="productInput" type="text" placeholder="例如：coffee, latte, grinder" />

        <label class="label">背景主色</label>
        <select id="colorFilter">
          <option value="">全部</option>
          <option value="red">紅</option>
          <option value="orange">橙</option>
          <option value="yellow">黃</option>
          <option value="green">綠</option>
          <option value="blue">藍</option>
          <option value="purple">紫</option>
          <option value="pink">粉</option>
          <option value="brown">啡</option>
          <option value="black">黑</option>
          <option value="white">白</option>
          <option value="gray">灰</option>
          <option value="unknown">未知</option>
        </select>

        <label class="checkbox">
          <input id="strictMode" type="checkbox" />
          嚴格模式（所有條件都要符合）
        </label>

        <div class="row">
          <button id="analyzeBtn" class="btn">分析</button>
          <button id="resetBtn" class="btn secondary">重置</button>
        </div>
      </div>
    </section>

    <section class="panel stats" id="statsPanel">
      <div class="stat"><span>原始資料</span><strong id="rawCount">0</strong></div>
      <div class="stat"><span>分析結果</span><strong id="resultCount">0</strong></div>
      <div class="stat"><span>高分結果</span><strong id="highScoreCount">0</strong></div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>結果</h2>
        <div class="row">
          <button id="exportCsvBtn" class="btn secondary">匯出 CSV</button>
          <button id="exportJsonBtn" class="btn secondary">匯出 JSON</button>
        </div>
      </div>
      <div id="results"></div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
